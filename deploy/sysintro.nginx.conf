# SysIntro nginx reverse proxy config
# Placeholder __SYSINTRO_DOMAIN__ is replaced by install.sh at deploy time.

gzip on;
gzip_types text/html text/css application/javascript application/json text/plain;
gzip_min_length 1024;

server {
    listen 80;
    listen [::]:80;
    server_name __SYSINTRO_DOMAIN__;

    client_max_body_size 25m;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                           always;
    add_header X-Frame-Options         "DENY"                              always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    # Uncomment after TLS is active (certbot will also add this):
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Static files served directly by nginx
    # Note: project root is deployed to /opt/sysintro/app/
    # and the FastAPI package lives in /opt/sysintro/app/app/ — hence app/app/static
    location /static/ {
        alias /opt/sysintro/app/app/static/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Everything else → uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # WebSocket / SSE support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
