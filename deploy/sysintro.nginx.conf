# SysIntro nginx reverse proxy config
# Placeholder __SYSINTRO_DOMAIN__ is replaced by install.sh at deploy time.
# Note: gzip is already enabled in /etc/nginx/nginx.conf on most Ubuntu
# distros — we don't redeclare it here to avoid duplicate-directive errors.

server {
    listen 80;
    listen [::]:80;
    server_name __SYSINTRO_DOMAIN__;

    client_max_body_size 25m;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                           always;
    add_header X-Frame-Options         "DENY"                              always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    # HSTS — harmless on HTTP, enforced once TLS is active. certbot keeps this.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # CSP — Tailwind + HTMX served from CDN; 'unsafe-inline' required for inline
    # event handlers and HTMX hx-on:* attributes. Tighten further if you self-host.
    # NOTE: nginx add_header does not support multi-line values; keep on one line.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://unpkg.com 'unsafe-inline'; style-src 'self' https://cdn.tailwindcss.com 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    # Static files served directly by nginx
    # Note: project root is deployed to /opt/sysintro/app/
    # and the FastAPI package lives in /opt/sysintro/app/app/ — hence app/app/static
    location /static/ {
        alias /opt/sysintro/app/app/static/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # Everything else → uvicorn
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # WebSocket / SSE support
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
