# SysIntro nginx reverse proxy config
# Placeholder __SYSINTRO_DOMAIN__ is replaced by install.sh at deploy time.
#
# Default (post-install.sh): HTTP only on port 80.
# To enable HTTPS via Cloudflare Origin Cert, see docs/CLOUDFLARE_TLS.md.

# ----------------------------------------------------------------------------
# Port 80
# ----------------------------------------------------------------------------
# If TLS is configured (Cloudflare Origin Cert present at /etc/nginx/ssl/), this
# block redirects HTTP→HTTPS — except when the request is already over HTTPS
# from a Cloudflare "Flexible" mode visitor (CF terminates TLS at edge and sets
# X-Forwarded-Proto: https while sending HTTP to the origin). The conditional
# guard prevents an infinite redirect loop in that mode.
#
# If you don't run TLS at the origin, comment out the `if` block — or just
# leave it: when /etc/nginx/ssl/origin.pem doesn't exist, the 443 server below
# won't be active and the redirect will return 301s into the void (browser
# error). Easiest: edit by hand depending on whether you're running TLS.

server {
    listen 80;
    listen [::]:80;
    server_name __SYSINTRO_DOMAIN__;

    # Loop-safe HTTP→HTTPS redirect. Only active when origin TLS is set up.
    # See docs/CLOUDFLARE_TLS.md for the full TLS setup procedure.
    if ($http_x_forwarded_proto != "https") {
        # Uncomment the next line ONLY after origin TLS is configured:
        # return 301 https://$host$request_uri;
    }

    client_max_body_size 25m;

    add_header X-Content-Type-Options  "nosniff"                           always;
    add_header X-Frame-Options         "DENY"                              always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.tailwindcss.com https://unpkg.com 'unsafe-inline'; style-src 'self' https://cdn.tailwindcss.com 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    location /static/ {
        alias /opt/sysintro/app/app/static/;
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}
