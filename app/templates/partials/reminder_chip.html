{# Expects: reminder (Reminder object) #}
{% if reminder %}
<div class="inline-flex items-center gap-1.5 bg-amber-50 border border-amber-200 text-amber-700 text-xs px-2.5 py-1 rounded-full">
  <span>🔔</span>
  <span>Erinnerung Stufe {{ reminder.stage }}</span>
  <span class="text-amber-500">{{ reminder.sent_at.strftime('%d.%m.%Y') if reminder.sent_at else '' }}</span>
</div>
{% endif %}
