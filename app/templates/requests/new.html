{% extends "base.html" %}
{% block title %}Neuer Antrag{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto px-4 py-16">
  <div class="bg-white rounded-2xl shadow-md border border-gray-200 p-8">

    <div class="mb-6">
      <a href="/requests" class="text-sm text-indigo-600 hover:underline">← Zurück zur Übersicht</a>
    </div>

    <h1 class="text-2xl font-bold text-gray-900 mb-2">Neuer Antrag</h1>
    <p class="text-sm text-gray-500 mb-6">
      Vergeben Sie zunächst einen aussagekräftigen Titel. Sie können alle weiteren Details anschließend im Formular ausfüllen.
    </p>

    <form method="post" action="/requests/new" class="space-y-5">
      <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-1">
          Antragstitel <span class="text-red-500">*</span>
        </label>
        <input
          type="text"
          id="title"
          name="title"
          required
          maxlength="255"
          placeholder="z. B. Einführung SAP Concur – Reisekostenabrechnung"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm"
          autofocus
        />
        <p class="text-xs text-gray-400 mt-1">Max. 255 Zeichen</p>
      </div>

      <div class="flex gap-3 pt-2">
        <button
          type="submit"
          class="flex-1 bg-indigo-700 hover:bg-indigo-800 text-white font-semibold py-2.5 px-4 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
        >
          Antrag anlegen
        </button>
        <a href="/requests" class="px-4 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition-colors font-medium">
          Abbrechen
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
